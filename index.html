  // 崔凯军 - 大TQ总部主管

  // 张芳芳 - 跨两个五级部门
  "张芳芳": { type: "multi_dept5", value: ["大TQ财务中心", "便利餐饮连锁事业财务部"] },
  // 吴丹 - 数智科技中心主管
  "吴丹": { type: "dept5", value: "数智科技中心" },
  // 吕韦辰 - 研发中心主管
  "吕韦辰": { type: "dept5", value: "研发中心" }
};
        
        function doSearch() {
            const name = document.getElementById('searchName').value.trim();
            const id = document.getElementById('searchId').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultBox = document.getElementById('resultBox');
            
            errorMsg.classList.remove('show');
            resultBox.classList.remove('show');
            
            if (!name || !id) {
                errorMsg.textContent = '请输入姓名和工号';
                errorMsg.classList.add('show');
                return;
            }
            
            const user = DATA.find(d => d.name === name && d.id === id);
            
            if (!user) {
                errorMsg.textContent = '姓名或工号错误，未找到对应记录';
                errorMsg.classList.add('show');
                return;
            }
            
            document.getElementById('userName').textContent = user.name + ' (' + user.id + ')';
            const deptStr = [user.dept4, user.dept5, user.dept6].filter(Boolean).join(' / ');
            document.getElementById('userDept').textContent = deptStr;
            
            let roleText = '普通员工';
            if (user.role === 'manager') roleText = '一阶主管';
            else if (user.role === 'special_manager') roleText = '特殊主管';
            document.getElementById('userRole').textContent = roleText;
            
            document.getElementById('scoreAiMatch').textContent = user.ai_match !== null ? user.ai_match : '未提交';
            document.getElementById('scoreAiMatch').className = 'score-value' + (user.ai_match === null ? ' null-val' : '');
            document.getElementById('scoreAiKpi').textContent = user.ai_kpi !== null ? user.ai_kpi : '未提交';
            document.getElementById('scoreAiKpi').className = 'score-value' + (user.ai_kpi === null ? ' null-val' : '');
            document.getElementById('scoreDocMatch').textContent = user.doc_match !== null ? user.doc_match : '未提交';
            document.getElementById('scoreDocMatch').className = 'score-value' + (user.doc_match === null ? ' null-val' : '');
            document.getElementById('scoreDocKpi').textContent = user.doc_kpi !== null ? user.doc_kpi : '未提交';
            document.getElementById('scoreDocKpi').className = 'score-value' + (user.doc_kpi === null ? ' null-val' : '');
            
            const subSection = document.getElementById('subSection');
            const subContent = document.getElementById('subContent');
            subContent.innerHTML = '';
            
            let subordinates = [];
            
            if (user.role === 'special_manager' && SPECIAL_MANAGERS[user.name]) {
                const rule = SPECIAL_MANAGERS[user.name];
                if (rule.type === 'dept5') {
                    subordinates = DATA.filter(d => d.dept5 === rule.value && d.id !== user.id);
                } else if (rule.type === 'dept4') {
                    subordinates = DATA.filter(d => d.dept4 === rule.value && d.id !== user.id);
                } else if (rule.type === 'multi_dept5') {
                    subordinates = DATA.filter(d => rule.value.includes(d.dept5) && d.id !== user.id);
                }
                
                if (rule.groupBy) {
                    const groups = {};
                    subordinates.forEach(s => {
                        const key = s[rule.groupBy] || '其他';
                        if (!groups[key]) groups[key] = [];
                        groups[key].push(s);
                    });
                    Object.keys(groups).sort().forEach(key => {
                        subContent.innerHTML += '<div class="group-title">' + key + ' (' + groups[key].length + '人)</div>';
                        subContent.innerHTML += buildTable(groups[key]);
                    });
                } else {
                    subContent.innerHTML = buildTable(subordinates);
                }
            } else if (user.role === 'manager') {
                if (user.dept4 === '餐饮群总部') {
                    subordinates = DATA.filter(d => d.dept6 === user.dept6 && d.id !== user.id);
                } else {
                    subordinates = DATA.filter(d => d.dept5 === user.dept5 && d.id !== user.id);
                }
                subContent.innerHTML = buildTable(subordinates);
            }
            
            if (subordinates.length > 0) {
                document.getElementById('subCount').textContent = subordinates.length + '人';
                subSection.style.display = 'block';
            } else {
                subSection.style.display = 'none';
            }
            
            resultBox.classList.add('show');
        }
        
        function buildTable(list) {
            let html = '<table class="data-table"><thead><tr>' +
                '<th>姓名</th><th>工号</th><th>部门</th>' +
                '<th>AI匹配</th><th>AI考核</th>' +
                '<th>协同匹配</th><th>协同考核</th>' +
                '</tr></thead><tbody>';
            list.forEach(s => {
                const dept = [s.dept4, s.dept5, s.dept6].filter(Boolean).join('/');
                html += '<tr>' +
                    '<td>' + s.name + '</td>' +
                    '<td>' + s.id + '</td>' +
                    '<td style="text-align:left; padding-left:10px;">' + dept + '</td>' +
                    '<td>' + (s.ai_match !== null ? s.ai_match : '-') + '</td>' +
                    '<td>' + (s.ai_kpi !== null ? s.ai_kpi : '-') + '</td>' +
                    '<td>' + (s.doc_match !== null ? s.doc_match : '-') + '</td>' +
                    '<td>' + (s.doc_kpi !== null ? s.doc_kpi : '-') + '</td>' +
                    '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }
        
        document.getElementById('searchId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
        document.getElementById('searchName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>
